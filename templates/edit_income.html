{% extends 'base.html' %}

{% block content %}

<div class="container py-5">


<div class="card shadow border-0">

    <div class="card-body p-4">

        <h2 class="mb-4">

            Edit Income

        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>Source</label>

                <input type="text"
                       name="source"
                       value="{{ income.source }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Amount</label>

                <input type="number"
                       name="amount"
                       value="{{ income.amount }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Date</label>

                <input type="date"
                       name="date"
                       value="{{ income.date }}"
                       class="form-control"
                       required>

            </div>

            <button class="btn btn-primary">

                Update Income

            </button>

            <a href="/income"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>


</div>

{% endblock %}
