{% extends 'base.html' %}

{% block content %}

<div class="auth-page">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-lg-5 col-md-7">

                <div class="card shadow-lg border-0">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <div class="register-logo">

                                <i class="fas fa-key"></i>

                            </div>

                            <h2 class="fw-bold mt-3">
                                Forgot Password
                            </h2>

                            <p class="text-muted">
                                Recover your CoinCount account
                            </p>

                        </div>

                        {% if not show_otp %}

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control form-control-lg"
                                       placeholder="Enter your registered email"
                                       required>

                            </div>

                            <div class="d-grid">

                                <button class="btn btn-primary btn-lg">

                                    <i class="fas fa-paper-plane me-2"></i>

                                    Send OTP

                                </button>

                            </div>

                        </form>

                        {% else %}

                        <form method="POST"
                              action="{{ url_for('reset_password') }}">

                            <input type="hidden"
                                   name="email"
                                   value="{{ email }}">

                            <div class="mb-3">

                                <label class="form-label">
                                    OTP
                                </label>

                                <input type="text"
                                       name="otp"
                                       class="form-control form-control-lg"
                                       placeholder="Enter OTP"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    New Password
                                </label>

                                <input type="password"
                                       name="new_password"
                                       class="form-control form-control-lg"
                                       required>

                            </div>

                            <div class="d-grid">

                                <button class="btn btn-success btn-lg">

                                    <i class="fas fa-lock me-2"></i>

                                    Reset Password

                                </button>

                            </div>

                        </form>

                        {% endif %}

                        <hr>

                        <div class="text-center">

                            <a href="/login"
                               class="text-decoration-none">

                                Back to Login

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
