{% extends 'base.html' %}

{% block content %}

<div class="container py-5">


<div class="card shadow border-0">

    <div class="card-body p-4">

        <h2 class="mb-4">

            Edit Expense

        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>Category</label>

                <input type="text"
                       name="category"
                       value="{{ expense.category }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Amount</label>

                <input type="number"
                       name="amount"
                       value="{{ expense.amount }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Description</label>

                <input type="text"
                       name="description"
                       value="{{ expense.description }}"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Date</label>

                <input type="date"
                       name="date"
                       value="{{ expense.date }}"
                       class="form-control"
                       required>

            </div>

            <button class="btn btn-primary">

                Update Expense

            </button>

            <a href="/expenses"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>


</div>

{% endblock %}
