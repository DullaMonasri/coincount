{% extends 'base.html' %}

{% block content %}

<div class="container py-4">

<div class="d-flex justify-content-between mb-4">

    <h2>Income Management</h2>

    <button class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#incomeModal">

        Add Income

    </button>

</div>

<!-- Modal -->

<div class="modal fade"
     id="incomeModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <form method="POST">

                <div class="modal-header">

                    <h5>Add Income</h5>

                    <button class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div class="mb-3">

                        <label>Source</label>

                        <input type="text"
                               name="source"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Amount</label>

                        <input type="number"
                               name="amount"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Date</label>

                        <input type="date"
                               name="date"
                               class="form-control"
                               required>

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-success">

                        Save

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- Income Table -->

<div class="card shadow border-0">

    <div class="card-body">

        <table class="table table-hover">

            <thead>

            <tr>

                <th>Source</th>
                <th>Amount</th>
                <th>Date</th>
                <th class="text-center">Action</th>

            </tr>

            </thead>

            <tbody>

            {% for item in income %}

            <tr>

                <td>{{ item.source }}</td>

                <td>₹{{ item.amount }}</td>

                <td>{{ item.date }}</td>

                <td>

                    <div class="action-buttons">

                        <a href="/edit_income/{{ item.income_id }}"
                           class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <a href="/delete_income/{{ item.income_id }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this income record?')">

                            Delete

                        </a>

                    </div>

                </td>

            </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</div>

{% endblock %}
